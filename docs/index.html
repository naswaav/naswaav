</head>
<body>
    <header>
        <img src="meong.png" alt = "data dummy">

    </header>
    <nav>
        <a href ="hal1.html">Link 1</a>

    <article>
        <h2>Form pemesanan Kendaraan</h2>
        <form action=""method="Post">
            <fieldset>
            <legend> Formulir Pemesanan Kendaraan</legend>
            <br>
            <label for="nama" >Nama Pemesanan:</label>
            <input type="text"required id="nama">
            <br>

            <br>
            <label for="alamat" >Alamat Pengiriman:</label>
            <input type="text"required id="alamat">
            <br>

            <br>
            <label for="tel" >Nomor telepon:</label>
            <input type="number" required id="tel">
            <br>

            <br>
            <label for="tglsewa" >Tanggal Sewa:</label>
            <input type="date"required id="tglsewa">
            <br>

            <br>
            <label for="tglpnjm" >Tanggal Pinjam:</label>
            <input type="date"required id="tglpnjm">
            <br>

            <br>
            <label for="kendaraan" >Jenis Kendaraan:</label>
            <select id="kendaraan" name="kendaraan">
                <option value="mobil">Mobil</option>
                <option value="motor">Motor</option>
            </select> 
            <br>

            <br>
            <label for="model" >Model Kendaraan:</label>
            <input type="text"required id="model">
            <br>

            <br>
            <label for="plat" >Nomor Plat Kendaraan:</label>
            <input type="text"required id="plat">
            <br>

            <br>
            <label for="asuransi" >Asuransi:</label>
            <select id="asuransi" name="asuransi">
                <option value="ya">Ya</option>
                <option value="tidak">Tidak</option>
            </select>
            <br>

            <br>
            <label for="ctt" >catatan khusus:</label>
            <input type="text"required id="ctt">
            <br>

            <br>
            <button type="submit">Kirim</button>
            </fieldset>
            <br>
        </form>
    </article>

    </footer>
</body>
</html>
